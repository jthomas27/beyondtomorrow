[pytest]
# BeyondTomorrow.World — test suite configuration

# Discover tests in the tests/ directory
testpaths = tests

# pytest-asyncio — use explicit @pytest.mark.asyncio per async test
asyncio_mode = auto

# Register custom markers so -m filtering works cleanly
markers =
    integration: Tests that require a live DATABASE_URL (pgvector on Railway)
    slow: Tests that are slow (e.g. first model load)

# Suppress the pytest-asyncio deprecation warning about auto-used fixtures
filterwarnings =
    ignore::DeprecationWarning:pytest_asyncio
    ignore::PendingDeprecationWarning

# Show extra info on failures
addopts = -v --tb=short
