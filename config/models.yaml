# config/models.yaml
#
# Model assignments for the BeyondTomorrow.World research agent pipeline.
#
# Edit this file to override which model handles each agent or task.
# Changes take effect at agent startup — no code changes needed.
#
# Available models (GitHub Models API — inference endpoint):
#
#   NOTE: Claude/Anthropic models are only available in the Copilot Chat UI,
#         NOT via the models.github.ai/inference API endpoint.
#
#   Zero-premium (no quota cost): openai/gpt-5-mini, openai/gpt-4.1-nano
#   High tier  (50 req/day):      openai/gpt-5, openai/gpt-4.1, openai/gpt-4o
#   Low tier   (500 req/day):     openai/gpt-4.1-mini
#
# Model selection strategy:
#   - openai/gpt-5       : complex tasks (research, writing, editing) — best quality
#   - openai/gpt-5-mini  : simple/deterministic tasks (orchestrating, publishing, indexing) — zero-premium
#
# See docs/GITHUB_COPILOT_MODELS.md for the full Copilot Chat model list.

# ---------------------------------------------------------------------------
# Agent model assignments
# Each entry maps an agent name to its primary model.
# ---------------------------------------------------------------------------

agents:
  orchestrator:
    model: openai/gpt-5-mini
    temperature: 0.1
    max_tokens: 2000
    note: "Multi-step handoff chain — gpt-5-mini is zero-premium and sufficient for routing"

  researcher:
    model: openai/gpt-5
    temperature: 0.2
    max_tokens: 8000
    note: "Complex multi-tool research + structured JSON synthesis — gpt-5 best quality"

  writer:
    model: openai/gpt-5
    temperature: 0.7
    max_tokens: 4000
    note: "Best writing quality — gpt-5 with higher temp for varied, engaging prose"

  editor:
    model: openai/gpt-5
    temperature: 0.3
    max_tokens: 4000
    note: "Careful fact-check + editorial reasoning — gpt-5 best for analytical tasks"

  publisher:
    model: openai/gpt-5-mini
    temperature: 0.0
    max_tokens: 1000
    note: "Deterministic metadata extraction + Ghost API call — gpt-5-mini is zero-premium"

  indexer:
    model: openai/gpt-5-mini
    temperature: 0.0
    max_tokens: 500
    note: "Chunking + indexing decisions — gpt-5-mini is zero-premium, saves budget"

# ---------------------------------------------------------------------------
# Optional: deep synthesis override
#
# Uncomment to use Opus for high-stakes or complex research tasks
# triggered with the --deep flag or OPUS: prefix in email subject.
# Opus is limited to 50 calls/day — use sparingly.
# ---------------------------------------------------------------------------

# deep_synthesis:
#   model: openai/gpt-4.1
#   temperature: 0.3
#   max_tokens: 8000
#   note: "Reserved for complex multi-source synthesis tasks only"

# ---------------------------------------------------------------------------
# Automatic degradation chain
#
# When a model's daily budget is exhausted (tracked in rate_limit_log),
# the agent automatically falls back to the next model in this list.
# The degradation logic lives in pipeline/guardrails.py (not yet implemented).
# ---------------------------------------------------------------------------

fallback_chain:
  - openai/gpt-5          # Primary — GA, high quality
  - openai/gpt-4.1        # Previous gen fallback — high tier, 50/day
  - openai/gpt-5-mini     # Zero-premium budget fallback
  - openai/gpt-4.1-mini   # Low tier fallback — 500/day
  - openai/gpt-4.1-nano   # Last resort — low tier, 500/day

# ---------------------------------------------------------------------------
# Degradation thresholds
#
# When a model's daily usage reaches these percentages of its limit,
# the agent warns (soft) or switches to the next model (hard).
# ---------------------------------------------------------------------------

degradation:
  soft_threshold_pct: 80   # Log a warning, continue using current model
  hard_threshold_pct: 95   # Automatically fall back to next model in chain
