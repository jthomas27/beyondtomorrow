# config/models.yaml
#
# Model assignments for the BeyondTomorrow.World research agent pipeline.
#
# Edit this file to override which model handles each agent or task.
# Changes take effect at agent startup — no code changes needed.
#
# Available models (GitHub Models API via Copilot Pro):
#
#   High-cost tier  (50 req/day,   multiplier 3x):  claude-opus-4-6
#   Medium tier     (200 req/day,  multiplier 1x):  claude-sonnet-4-6, claude-sonnet-4
#   Low-cost tier   (3000 req/day, multiplier 0.33x): claude-haiku-4-5
#
# Model selection strategy:
#   - claude-sonnet-4-6 : complex tasks (research, writing, editing) — best quality at 1x cost
#   - claude-haiku-4-5  : simple/deterministic tasks (orchestrating, publishing, indexing) — 0.33x cost
#   - claude-opus-4-6   : reserved for --deep flag only (3x cost)
#
# See docs/GITHUB_COPILOT_MODELS.md for the full model list.

# ---------------------------------------------------------------------------
# Agent model assignments
# Each entry maps an agent name to its primary model.
# ---------------------------------------------------------------------------

agents:
  orchestrator:
    model: claude-haiku-4-5
    temperature: 0.1
    max_tokens: 2000
    note: "Routes tasks to sub-agents — routing is deterministic, haiku saves 0.67x vs sonnet"

  researcher:
    model: claude-sonnet-4-6
    temperature: 0.2
    max_tokens: 8000
    note: "Complex multi-tool research + structured JSON synthesis — best Sonnet at same 1x cost"

  writer:
    model: claude-sonnet-4-6
    temperature: 0.7
    max_tokens: 4000
    note: "Best writing quality in Sonnet tier — higher temp for varied, engaging prose"

  editor:
    model: claude-sonnet-4-6
    temperature: 0.3
    max_tokens: 4000
    note: "Careful fact-check + editorial reasoning — sonnet-4-6 best for analytical tasks"

  publisher:
    model: claude-haiku-4-5
    temperature: 0.0
    max_tokens: 1000
    note: "Deterministic metadata extraction + Ghost API call — haiku-4-5 sufficient, 0.33x cost"

  indexer:
    model: claude-haiku-4-5
    temperature: 0.0
    max_tokens: 500
    note: "Chunking + indexing decisions — minimal reasoning, haiku-4-5 at 0.33x cost"

# ---------------------------------------------------------------------------
# Optional: deep synthesis override
#
# Uncomment to use Opus for high-stakes or complex research tasks
# triggered with the --deep flag or OPUS: prefix in email subject.
# Opus is limited to 50 calls/day — use sparingly.
# ---------------------------------------------------------------------------

# deep_synthesis:
#   model: claude-opus-4-6
#   temperature: 0.3
#   max_tokens: 8000
#   note: "Reserved for complex multi-source synthesis tasks only"

# ---------------------------------------------------------------------------
# Automatic degradation chain
#
# When a model's daily budget is exhausted (tracked in rate_limit_log),
# the agent automatically falls back to the next model in this list.
# The degradation logic lives in pipeline/guardrails.py (not yet implemented).
# ---------------------------------------------------------------------------

fallback_chain:
  - claude-opus-4-6      # Deep synthesis only — 3x multiplier, 50/day
  - claude-sonnet-4-6    # Primary workhorse — 1x multiplier, 200/day
  - claude-sonnet-4      # Sonnet fallback — 1x multiplier, 200/day
  - claude-haiku-4-5     # High-volume fallback — 0.33x multiplier, 3000/day

# ---------------------------------------------------------------------------
# Degradation thresholds
#
# When a model's daily usage reaches these percentages of its limit,
# the agent warns (soft) or switches to the next model (hard).
# ---------------------------------------------------------------------------

degradation:
  soft_threshold_pct: 80   # Log a warning, continue using current model
  hard_threshold_pct: 95   # Automatically fall back to next model in chain
