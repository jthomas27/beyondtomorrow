# config/sources.yaml
#
# Approved research sources for BeyondTomorrow.World
#
# Edit this file to add/remove approved domains and API configurations.
# Changes here are picked up at agent startup — no code changes needed.
#
# See docs/SOURCES.md for the full annotated reference table and API notes.

# ---------------------------------------------------------------------------
# Search engine backends
# Each entry configures how the Researcher agent queries that engine.
# ---------------------------------------------------------------------------

search_engines:

  duckduckgo:
    enabled: true
    # No API key required — uses the duckduckgo_search Python package
    default_max_results: 10
    # Restrict results to approved domains only (applied client-side)
    safe_search: moderate    # off | moderate | strict

  arxiv:
    enabled: true
    # No API key required — uses the arxiv Python package (arXiv public API)
    default_max_results: 5
    # arXiv subject categories to prioritise
    categories:
      - cs.AI        # Artificial Intelligence
      - cs.LG        # Machine Learning
      - cs.CY        # Computers and Society
      - q-bio        # Quantitative Biology
      - econ         # Economics
      - physics.ao-ph  # Atmospheric & Oceanic Physics (climate)

  pubmed:
    enabled: false
    # Free Entrez API — no auth key required for <3 req/sec
    api_url: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/"
    default_max_results: 5
    # Set NCBI_API_KEY env var for higher rate limits (10 req/sec)
    api_key_env: NCBI_API_KEY

  semantic_scholar:
    enabled: false
    api_url: "https://api.semanticscholar.org/graph/v1"
    default_max_results: 5
    # Optional — unauthenticated calls are rate-limited to 100 req/5min
    api_key_env: SEMANTIC_SCHOLAR_API_KEY

# ---------------------------------------------------------------------------
# Approved domains
#
# Only URLs from these domains may be fetched by fetch_page().
# Organised by category. Add new entries as needed.
#
# Format:
#   - domain: <apex domain without www or https>
#     category: <academic|climate|technology|policy|news|data>
#     credibility: <1-5>      # 5 = highest (peer-reviewed / gov / major outlet)
#     notes: <optional human-readable note>
# ---------------------------------------------------------------------------

