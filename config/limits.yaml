# config/limits.yaml
#
# Production limits — Copilot Pro+ (unlimited premium requests)
#
# Edit this file to tune agent behaviour without touching Python code.
# All values are read at agent startup.

# ---------------------------------------------------------------------------
# Daily budget — hard ceilings reset at midnight UTC
# ---------------------------------------------------------------------------

budget:
  # Maximum number of LLM API calls allowed across all tasks in one day.
  max_llm_calls_per_day: 500

  # Maximum total input+output tokens (across all models) allowed per day.
  # Pro+ has no hard token cap; this is a safety net.
  max_tokens_per_day: 500000

  # Maximum number of full pipeline tasks (BLOG:/RESEARCH:/etc.) per day.
  max_tasks_per_day: 20

  # Maximum number of web page fetches across all tasks in one day.
  max_fetches_per_day: 200

# ---------------------------------------------------------------------------
# Fetch limits — controls how many pages are retrieved per research run
# ---------------------------------------------------------------------------

fetch:
  # ENFORCED — search.py caps DuckDuckGo results per query
  max_pages_per_query: 8

  # NOT ENFORCED — no cumulative counter across queries in code
  max_pages_per_task: 25

  # ENFORCED — search.py truncates fetched page text to this limit
  max_content_chars_per_page: 16000

  # ENFORCED — search.py passes this as httpx timeout
  request_timeout_seconds: 15

  # NOT ENFORCED — no concurrency control in search_and_index
  max_concurrent_fetches: 5

  # Delay between sequential fetches to the same domain (seconds).
  per_domain_delay_seconds: 1.0

# ---------------------------------------------------------------------------
# Search limits — result caps for each search engine
# ---------------------------------------------------------------------------

search:
  # NOT ENFORCED at runtime — Researcher uses hardcoded defaults in search tool
  # function signatures. Kept here for documentation only.
  max_search_calls_per_task: 10

  duckduckgo:
    # NOT ENFORCED — search.py uses hardcoded default_max_results in function sig
    default_max_results: 10
    hard_max_results: 20

  arxiv:
    # NOT ENFORCED — search_arxiv() uses hardcoded default in function sig
    default_max_results: 5
    hard_max_results: 10

  corpus:
    # NOT ENFORCED — search_corpus() uses hardcoded top_k=5 in function sig
    default_top_k: 5
    # ENFORCED — corpus.py reads this to cap corpus search results
    hard_max_top_k: 10
    # ENFORCED — corpus.py filters embeddings by cosine similarity
    min_similarity_threshold: 0.30   # lowered — bge-small produces tighter similarity scores
    # ENFORCED — corpus.py truncates each chunk in search_corpus output.
    # Caps token usage: 5 chunks × ~1500 chars ≈ ~1800 tokens, safe within 8k limit.
    max_chars_per_chunk: 1500

# ---------------------------------------------------------------------------
# Synthesis limits — NOT ENFORCED at runtime
# ---------------------------------------------------------------------------
# These values are loaded by config_loader.py but never read by any agent,
# tool, or SDK call. The actual max_tokens per agent are set exclusively in
# config/models.yaml → model_settings_for() in pipeline/definitions.py.
#
# Kept here for documentation — they describe the intended output budgets
# but have no runtime effect. To change agent output limits, edit models.yaml.
# ---------------------------------------------------------------------------

synthesis:
  max_draft_tokens: 4000              # NOT ENFORCED — Writer uses models.yaml max_tokens: 4000
  max_edit_tokens: 2500               # NOT ENFORCED — Editor uses models.yaml max_tokens: 2500
  max_research_output_tokens: 8000    # NOT ENFORCED — Researcher uses models.yaml max_tokens: 8000
  max_key_findings: 10                # NOT ENFORCED — Researcher outputs all findings
  max_sources_cited: 20               # NOT ENFORCED — no guard in Writer/Editor

# ---------------------------------------------------------------------------
# Task limits — NOT ENFORCED at runtime
# ---------------------------------------------------------------------------
# max_turns is hardcoded per-agent in pipeline/main.py:
#   Researcher: 8, Writer: 6, Editor: 6, Publisher: 6, Orchestrator: 30
# Other values are loaded but never referenced in code.
# ---------------------------------------------------------------------------

task:
  max_tool_calls_per_run: 50          # NOT ENFORCED — SDK handles internally
  max_turns: 30                       # NOT ENFORCED — hardcoded per-agent in main.py
  max_handoffs: 5                     # NOT ENFORCED — no guard in code
  task_timeout_seconds: 600           # NOT ENFORCED — main.py uses _AGENT_TIMEOUT = 300

# ---------------------------------------------------------------------------
# Chunking limits
# ---------------------------------------------------------------------------

chunking:
  max_words_per_chunk: 350           # bge-small-en-v1.5 supports 512 tokens (~350 words)
  overlap_words: 35                  # ~10% overlap — enough for cross-boundary context

# ---------------------------------------------------------------------------
# Embedding limits
# ---------------------------------------------------------------------------

embeddings:
  batch_size: 16                      # production: 64
  model_max_input_tokens: 512        # bge-small-en-v1.5 hard limit
