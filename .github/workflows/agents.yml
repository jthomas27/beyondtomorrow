name: Research Agent

on:
  # Saturdays at 08:00 BST (07:00 UTC, Mar–Oct).
  # Change back to "0 8 * * 6" when clocks go back in October 2026.
  schedule:
    - cron: "0 7 * * 6"

  # Manual trigger — supports any BLOG:, RESEARCH:, REPORT:, or PUBLISH: task.
  workflow_dispatch:
    inputs:
      task:
        description: "Task to run (e.g. BLOG: topic, RESEARCH: topic, REPORT: topic)"
        required: true
        type: string
      model:
        description: "Override agent model (e.g. openai/gpt-4.1-mini for faster/cheaper runs)"
        required: false
        default: ""

jobs:
  run-agent:
    name: Run Research Agent
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      GITHUB_TOKEN: ${{ secrets.AGENT_GITHUB_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GHOST_URL: ${{ secrets.GHOST_URL }}
      GHOST_ADMIN_KEY: ${{ secrets.GHOST_ADMIN_KEY }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check agent status
        run: python -m pipeline.main status

      # -----------------------------------------------------------------------
      # Scheduled path — pick 3 topics from config/topics.yaml and research each.
      # All 3 run even if one fails; the step exits non-zero if any failed.
      # -----------------------------------------------------------------------

      - name: Pick research topics
        if: github.event_name == 'schedule'
        id: topics
        run: python scripts/pick_research_topics.py

      - name: Run weekly research
        if: github.event_name == 'schedule'
        run: |
          FAILED=0
          python -m pipeline.main "RESEARCH: ${{ steps.topics.outputs.topic1 }}" || FAILED=1
          python -m pipeline.main "RESEARCH: ${{ steps.topics.outputs.topic2 }}" || FAILED=1
          python -m pipeline.main "RESEARCH: ${{ steps.topics.outputs.topic3 }}" || FAILED=1
          exit $FAILED

      # -----------------------------------------------------------------------
      # Manual path — run any task directly with optional model override.
      # -----------------------------------------------------------------------

      - name: Run manual task
        if: github.event_name == 'workflow_dispatch'
        run: |
          MODEL_FLAG=""
          if [ -n "${{ github.event.inputs.model }}" ]; then
            MODEL_FLAG="--model ${{ github.event.inputs.model }}"
          fi
          python -m pipeline.main $MODEL_FLAG "${{ github.event.inputs.task }}"

      # -----------------------------------------------------------------------
      # Always: upload research output artifacts.
      # On failure: send notification email via Hostinger SMTP.
      # -----------------------------------------------------------------------

      - name: Upload research output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-output-${{ github.run_id }}
          path: research/
          retention-days: 30
          if-no-files-found: ignore

      - name: Notify on completion
        if: always() && env.NOTIFY_EMAIL != ''
        run: |
          python scripts/notify_pipeline_result.py \
            --to "${{ env.NOTIFY_EMAIL }}" \
            --status "${{ job.status }}" \
            --event "${{ github.event_name }}" \
            --topic1 "${{ steps.topics.outputs.topic1 }}" \
            --topic2 "${{ steps.topics.outputs.topic2 }}" \
            --topic3 "${{ steps.topics.outputs.topic3 }}" \
            --task "${{ github.event.inputs.task }}" \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
